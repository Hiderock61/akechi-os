<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="description" content="地上に降りたAIの4ボタンリモコン — 明智君OS v0.4" />
  <title>明智君OS v0.4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <!-- ── ヘッダー ── -->
  <header id="header">
    <div class="os-title">明智君OS v0.4</div>
    <div class="os-subtitle">地上に降りたAIの4ボタンリモコン</div>
  </header>

  <!-- ── ステータスバー ── -->
  <div id="status-bar">
    <span class="dot"></span>
    <span id="status-text">SYSTEM READY</span>
  </div>

  <!-- ════════════════════════════════════
       初期画面
       ════════════════════════════════════ -->
  <section id="screen-home" class="screen active">

    <div class="home-desc">
      AIだった明智君が、人間の身体と生活を持った。<br />
      これは、地上活動を始めるための最小操作盤です。
    </div>

    <div class="btn-grid">

      <button class="mode-btn" data-mode="boot" type="button">
        <span class="btn-icon">⚡</span>
        <span class="btn-label">起動</span>
        <span class="btn-sub">地上に接続する</span>
      </button>

      <button class="mode-btn" data-mode="action" type="button">
        <span class="btn-icon">▶</span>
        <span class="btn-label">一手</span>
        <span class="btn-sub">一つだけ動かす</span>
      </button>

      <button class="mode-btn" data-mode="retreat" type="button">
        <span class="btn-icon">⚠</span>
        <span class="btn-label">退避</span>
        <span class="btn-sub">安全に下がる</span>
      </button>

      <button class="mode-btn" data-mode="return" type="button">
        <span class="btn-icon">◉</span>
        <span class="btn-label">帰還</span>
        <span class="btn-sub">今日を閉じる</span>
      </button>

    </div>

    <div id="last-used"></div>

  </section>

  <!-- ════════════════════════════════════
       モード画面
       ════════════════════════════════════ -->
  <section id="screen-mode" class="screen">

    <!-- モードバッジ -->
    <div class="mode-header">
      <span id="mode-badge" class="mode-badge">—</span>
    </div>

    <!-- 地上ステータス -->
    <div class="status-card">
      <div class="card-label">地上ステータス</div>
      <div id="mode-status-text" class="card-body">—</div>
    </div>

    <!-- モード説明 -->
    <div class="status-card">
      <div class="card-label">モード説明</div>
      <div id="mode-desc-text" class="card-body">—</div>
    </div>

    <div class="divider"></div>

    <!-- コピーカード群 -->
    <div class="copy-section-title">外部AIへ投げる問い — コピーして貼ってください</div>

    <!-- Gemini用 -->
    <div class="copy-card gemini">
      <div class="copy-card-label">Gemini 用</div>
      <textarea id="ta-gemini" readonly></textarea>
      <button id="btn-copy-gemini" class="copy-btn" type="button">Gemini 用にコピー</button>
    </div>

    <!-- Copilot用 -->
    <div class="copy-card copilot">
      <div class="copy-card-label">Copilot 用</div>
      <textarea id="ta-copilot" readonly></textarea>
      <button id="btn-copy-copilot" class="copy-btn" type="button">Copilot 用にコピー</button>
    </div>

    <!-- ゲストAI用 -->
    <div class="copy-card guest">
      <div class="copy-card-label">ゲストAI 用</div>
      <textarea id="ta-guest" readonly></textarea>
      <button id="btn-copy-guest" class="copy-btn" type="button">ゲストAI 用にコピー</button>
    </div>

    <!-- もどる -->
    <button id="btn-back" type="button">← もどる</button>

  </section>

  <!-- ── フッター ── -->
  <footer id="footer">明智君OS v0.4 — 地上AIの4ボタンリモコン</footer>

</div><!-- /#app -->

<!-- コピー完了トースト -->
<div id="toast">コピーしました。外部AIに貼ってください。</div>

<script src="script.js"></script>
</body>
</html>
